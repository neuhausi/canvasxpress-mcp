<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { fill: none; stroke: #888; stroke-width: 1.5; marker-end: url(#arrow); }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .box-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .box-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .box-green  { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 0.5; }
      .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .txt-purple { fill: #3C3489; }
      .txt-teal   { fill: #085041; }
      .txt-blue   { fill: #0C447C; }
      .txt-amber  { fill: #633806; }
      .txt-green  { fill: #27500A; }
      .txt-gray   { fill: #444441; }
    </style>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="30" text-anchor="middle" style="font-size:15px;font-weight:500">How the knowledge base is used — per request</text>

  <!-- Source files label -->
  <text class="ts" x="340" y="62" text-anchor="middle">neuhausi/canvasxpress-LLM repo (loaded once at server startup)</text>

  <!-- 5 source boxes -->
  <rect class="box-purple" x="28"  y="74" width="104" height="48" rx="6"/>
  <text class="th txt-purple" x="80"  y="93"  text-anchor="middle">RULES.md</text>
  <text class="ts txt-purple" x="80"  y="111" text-anchor="middle">axis rules</text>

  <rect class="box-purple" x="142" y="74" width="104" height="48" rx="6"/>
  <text class="th txt-purple" x="194" y="93"  text-anchor="middle">SCHEMA.md</text>
  <text class="ts txt-purple" x="194" y="111" text-anchor="middle">param definitions</text>

  <rect class="box-purple" x="256" y="74" width="120" height="48" rx="6"/>
  <text class="th txt-purple" x="316" y="93"  text-anchor="middle">DECISION-TREE</text>
  <text class="ts txt-purple" x="316" y="111" text-anchor="middle">graph type logic</text>

  <rect class="box-purple" x="386" y="74" width="120" height="48" rx="6"/>
  <text class="th txt-purple" x="446" y="93"  text-anchor="middle">MINIMAL-PARAMS</text>
  <text class="ts txt-purple" x="446" y="111" text-anchor="middle">required fields</text>

  <rect class="box-teal" x="516" y="74" width="136" height="48" rx="6"/>
  <text class="th txt-teal" x="584" y="93"  text-anchor="middle">few_shot_examples</text>
  <text class="ts txt-teal" x="584" y="111" text-anchor="middle">.json (66–3000)</text>

  <!-- Arrows to SYSTEM_PROMPT and EMBEDDINGS -->
  <line x1="80"  y1="122" x2="270" y2="188" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="194" y1="122" x2="285" y2="188" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="316" y1="122" x2="310" y2="188" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="446" y1="122" x2="336" y2="188" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="584" y1="122" x2="584" y2="188" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- SYSTEM_PROMPT box -->
  <rect class="box-purple" x="170" y="194" width="320" height="56" rx="8"/>
  <text class="th txt-purple" x="330" y="216" text-anchor="middle">SYSTEM_PROMPT  (Python f-string)</text>
  <text class="ts txt-purple" x="330" y="234" text-anchor="middle">All 4 files embedded as plain text at module load time</text>

  <!-- EMBEDDINGS box -->
  <rect class="box-teal" x="510" y="194" width="148" height="56" rx="8"/>
  <text class="th txt-teal" x="584" y="216" text-anchor="middle">embeddings.db</text>
  <text class="ts txt-teal" x="584" y="234" text-anchor="middle">sqlite-vec index</text>

  <!-- Divider -->
  <line x1="40" y1="276" x2="640" y2="276" stroke="#aaa" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="ts" x="340" y="294" text-anchor="middle" style="fill:#888">— per request —</text>

  <!-- USER INPUT -->
  <rect class="box-gray" x="160" y="304" width="340" height="48" rx="8"/>
  <text class="th txt-gray" x="330" y="322" text-anchor="middle">User input</text>
  <text class="ts txt-gray" x="330" y="340" text-anchor="middle">description + headers + column_types</text>

  <!-- Arrows to Step 1 and Step 2 -->
  <line x1="280" y1="352" x2="220" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="380" y1="352" x2="440" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Step 1: RETRIEVAL -->
  <rect class="box-teal" x="80"  y="406" width="260" height="64" rx="8"/>
  <text class="th txt-teal" x="210" y="426" text-anchor="middle">Step 1 — retrieve_examples()</text>
  <text class="ts txt-teal" x="210" y="444" text-anchor="middle">embed query → cosine similarity</text>
  <text class="ts txt-teal" x="210" y="460" text-anchor="middle">→ top-6 examples from embeddings.db</text>

  <!-- Step 2: BUILD PROMPT -->
  <rect class="box-blue" x="360" y="406" width="240" height="64" rx="8"/>
  <text class="th txt-blue" x="480" y="426" text-anchor="middle">Step 2 — build user prompt</text>
  <text class="ts txt-blue" x="480" y="444" text-anchor="middle">6 examples + description</text>
  <text class="ts txt-blue" x="480" y="460" text-anchor="middle">+ column hint with types</text>

  <!-- Arrows to Step 3 -->
  <line x1="210" y1="470" x2="300" y2="530" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <line x1="480" y1="470" x2="390" y2="530" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Dashed line from SYSTEM_PROMPT to Step 3 -->
  <line x1="330" y1="250" x2="330" y2="530" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="258" y="500" text-anchor="middle" style="fill:#534AB7">system=SYSTEM_PROMPT</text>

  <!-- Step 3: ANTHROPIC API -->
  <rect class="box-amber" x="180" y="536" width="300" height="56" rx="8"/>
  <text class="th txt-amber" x="330" y="558" text-anchor="middle">Step 3 — Anthropic API call</text>
  <text class="ts txt-amber" x="330" y="576" text-anchor="middle">system prompt + user prompt → Claude</text>

  <!-- Arrow down -->
  <line x1="330" y1="592" x2="330" y2="634" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Steps 4–6 -->
  <rect class="box-green" x="140" y="640" width="380" height="64" rx="8"/>
  <text class="th txt-green" x="330" y="662" text-anchor="middle">Steps 4–6 — parse, validate, return</text>
  <text class="ts txt-green" x="330" y="680" text-anchor="middle">strip fences → parse JSON → validate column refs</text>
  <text class="ts txt-green" x="330" y="696" text-anchor="middle">→ return {config, valid, warnings, headers_used}</text>

  <!-- Side accent bars -->
  <rect x="2" y="536" width="8" height="56" rx="2" fill="#534AB7" opacity="0.7"/>
  <rect x="2" y="406" width="8" height="124" rx="2" fill="#0F6E56" opacity="0.7"/>
</svg>
